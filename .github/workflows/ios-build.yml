name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS archive
        run: |
          cd ios
          xcodebuild \
          -workspace App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          build

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r ios/build/Release-iphoneos/App.app Payload/
          zip -r LifeSite.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: LifeSite.ipa
